<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Kanban Board</title>
<style>
body { font-family: Arial; background:#f4f4f4; padding:20px; }
h1 { text-align:center; }
.board { display:flex; gap:20px; justify-content:center; }
.column { background:#fff; width:270px; padding:10px; border-radius:8px; }
.todo { border-top:6px solid red; }
.doing { border-top:6px solid blue; }
.done { border-top:6px solid green; }
.task {
  background:#eee; margin:6px 0; padding:8px;
  display:flex; justify-content:space-between; align-items:center;
  border-radius:4px; cursor:grab;
}
.task-buttons button {
  margin-left:4px; font-size:12px;
}
.delete { background:red; color:white; border:none; }
.edit { background:orange; color:white; border:none; }
</style>
</head>
<body>

<h1>Kanban Task Board</h1>

<div class="board">
  <div class="column todo" data-status="todo">
    <h2>To Do</h2>
    <div class="tasks"></div>
    <input placeholder="New task">
    <button>Add</button>
  </div>

  <div class="column doing" data-status="doing">
    <h2>Doing</h2>
    <div class="tasks"></div>
  </div>

  <div class="column done" data-status="done">
    <h2>Done</h2>
    <div class="tasks"></div>
  </div>
</div>

<script>
const data = JSON.parse(localStorage.getItem("kanban")) || {todo:[], doing:[], done:[]};

function save(){ localStorage.setItem("kanban", JSON.stringify(data)); }

function render(){
  document.querySelectorAll(".column").forEach(col=>{
    const status = col.dataset.status;
    const box = col.querySelector(".tasks");
    box.innerHTML = "";

    data[status].forEach((task,i)=>{
      const div = document.createElement("div");
      div.className="task";
      div.draggable=true;

      const span = document.createElement("span");
      span.textContent = task;

      const btns = document.createElement("div");
      btns.className="task-buttons";

      const edit = document.createElement("button");
      edit.textContent="Edit";
      edit.className="edit";
      edit.onclick=()=>{
        const updated = prompt("Edit task:", task);
        if(updated){
          data[status][i]=updated;
          save(); render();
        }
      };

      btns.appendChild(edit);

      if(status==="done"){
        const del = document.createElement("button");
        del.textContent="Delete";
        del.className="delete";
        del.onclick=()=>{
          if(confirm("Are you sure you want to delete this task?")){
            data.done.splice(i,1);
            save(); render();
          }
        };
        btns.appendChild(del);
      }

      div.append(span, btns);

      div.ondragstart=e=>e.dataTransfer.setData("text/plain", JSON.stringify({status,i}));
      box.appendChild(div);
    });
  });
}

document.querySelectorAll(".column").forEach(col=>{
  col.ondragover=e=>e.preventDefault();
  col.ondrop=e=>{
    const d = JSON.parse(e.dataTransfer.getData("text/plain"));
    const t = data[d.status].splice(d.i,1)[0];
    data[col.dataset.status].push(t);
    save(); render();
  };

  const btn = col.querySelector("button");
  if(btn){
    btn.onclick=()=>{
      const inp = col.querySelector("input");
      if(inp.value.trim()){
        data.todo.push(inp.value.trim());
        inp.value="";
        save(); render();
      }
    }
  }
});

render();
</script>
</body>
</html>
